version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pg-indexer
    environment:
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: REDACTED
      POSTGRES_DB: indexer
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d   # put your .sql here to auto-run on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer -d indexer"]
      interval: 5s
      timeout: 3s
      retries: 10
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
